<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Canzo</title>
    <meta name="description" content="Create your Canzo account for EASA College of Engineering and Technology. Start pre-ordering meals today.">
    <meta property="og:title" content="Sign Up - Canzo">
    <meta property="og:description" content="Create your Canzo account for EASA College of Engineering and Technology.">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary">
    <link rel="icon" href="https://canzo.in/assets/image/canzo official logo.png" type="image/png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/app.css">
    <link rel="stylesheet" href="css/cursor.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="heavenly-orb heavenly-orb--1"></div>
    <div class="heavenly-orb heavenly-orb--2"></div>
    <div class="heavenly-orb heavenly-orb--3"></div>

    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <img src="https://canzo.in/assets/image/canzo official logo.png" alt="Canzo Logo" class="auth-logo">
                    <h1 class="auth-title">Create Account</h1>
                    <p class="auth-subtitle">Join Canzo and skip the queue at Food Court</p>
                </div>

                <button type="button" class="btn-google" id="googleRegisterBtn">
                    <svg viewBox="0 0 24 24" width="20" height="20"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                    Sign up with Google
                </button>

                <div class="form-divider">or sign up with email</div>

                <form id="registerForm" onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label class="form-label" for="name">Full Name</label>
                        <input type="text" id="name" class="form-input" placeholder="Ganesh" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="email">Email Address</label>
                        <input type="email" id="email" class="form-input" placeholder="e720524am006@ecetonline.com" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="registerNumber">Register Number</label>
                        <input type="text" id="registerNumber" class="form-input" placeholder="E720524AM006" required>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="department">Department</label>
                            <select id="department" class="form-select" required>
                                <option value="">Choose...</option>
                                <option value="cse">Computer Science & Engineering</option>
                                <option value="ece">Electronics & Communication</option>
                                <option value="eee">Electrical & Electronics</option>
                                <option value="mech">Mechanical Engineering</option>
                                <option value="civil">Civil Engineering</option>
                                <option value="it">Information Technology</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="year">Year</label>
                            <select id="year" class="form-select" required>
                                <option value="">Year</option>
                                <option value="1st Year">1st Year</option>
                                <option value="2nd Year">2nd Year</option>
                                <option value="3rd Year">3rd Year</option>
                                <option value="4th Year">4th Year</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="phone">Phone Number</label>
                        <input type="tel" id="phone" class="form-input" placeholder="+91 701073672X" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="password">Password</label>
                        <input type="password" id="password" class="form-input" placeholder="Min 6 characters" minlength="6" required>
                    </div>

                    <div class="form-group">
                        <div class="form-checkbox">
                            <input type="checkbox" id="terms" required>
                            <label for="terms">I agree to the Terms of Service and Privacy Policy</label>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary btn-large btn-full">Create Account</button>
                    </div>
                </form>

                <div class="form-footer">
                    Already have an account? <a href="login.html">Sign in</a>
                </div>
            </div>

            <p style="text-align: center; margin-top: 24px; font-size: 14px; color: var(--color-text-light);">
                <a href="index.html" style="color: var(--color-accent); font-weight: 500;">← Back to home</a>
            </p>
        </div>
    </div>

    <script src="js/cursor.js"></script>
    <script src="js/clock.js"></script><script type="module" src="js/app.js"></script>
</body>
</html>

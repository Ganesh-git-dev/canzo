<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Menu - Canzo</title>
    <meta name="description" content="Manage your canteen menu on Canzo — add, edit, and organize food items.">
    <meta property="og:title" content="Manage Menu - Canzo">
    <meta property="og:description" content="Manage your canteen menu on Canzo — add, edit, and organize food items.">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary">
    <link rel="icon" href="https://canzo.in/assets/image/canzo official logo.png" type="image/png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/app.css">
    <link rel="stylesheet" href="css/cursor.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="heavenly-orb heavenly-orb--1"></div>
    <div class="heavenly-orb heavenly-orb--2"></div>
    <div class="heavenly-orb heavenly-orb--3"></div>

    <div class="app-layout">
        <aside class="app-sidebar" id="sidebar">
            <div class="app-sidebar-logo">
                <img src="https://canzo.in/assets/image/canzo official logo.png" alt="Canzo">
            </div>

            <nav class="app-nav">
                <a href="canteen-dashboard.html" class="app-nav-link">
                    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                    Dashboard
                </a>
                <a href="canteen-menu.html" class="app-nav-link active">
                    <svg viewBox="0 0 24 24"><path d="M18 8h1a4 4 0 010 8h-1"/><path d="M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>
                    Manage Menu
                </a>
                <a href="canteen-orders.html" class="app-nav-link">
                    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
                    Orders
                    <span class="app-badge app-badge--pulse">3</span>
                </a>
                <div class="app-nav-divider"></div>
                <a href="canteen-analytics.html" class="app-nav-link">
                    <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
                    Analytics
                </a>
                <a href="canteen-settings.html" class="app-nav-link">
                    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
                    Settings
                </a>
                <div class="app-nav-divider"></div>
                <a href="login.html" class="app-nav-link">
                    <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    Logout
                </a>
            </nav>

            <div class="app-sidebar-footer">
                <div class="app-user-info">
                    <div class="app-user-avatar app-user-avatar--canteen">MC</div>
                    <div class="app-user-details">
                        <div class="app-user-name">Main Canteen</div>
                        <div class="app-user-role">Block A, Ground Floor</div>
                    </div>
                </div>
            </div>
        </aside>

        <main class="app-main">
            <header class="app-header">
                <div class="app-header-left">
                    <div>
                        <h1 class="app-header-title">Manage Menu</h1>
                        <p class="app-header-subtitle">Add, edit, and organize your food items</p>
                    </div>
                </div>
                <div class="app-header-right">
                    <button class="btn btn-primary" id="addMenuItemBtn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                        Add Item
                    </button>
                </div>
            </header>

            <div class="app-content">
                <div class="menu-management-categories" id="menuCategories">
                    <button class="menu-category-btn active" data-category="all">All Items</button>
                    <button class="menu-category-btn" data-category="biryani">Biryani</button>
                    <button class="menu-category-btn" data-category="pizza">Pizza</button>
                    <button class="menu-category-btn" data-category="burgers">Burgers</button>
                    <button class="menu-category-btn" data-category="drinks">Drinks</button>
                    <button class="menu-category-btn" data-category="snacks">Snacks</button>
                    <button class="menu-category-btn" data-category="desserts">Desserts</button>
                    <button class="menu-category-btn" data-category="short-bites">Short Bites</button>
                    <button class="menu-category-btn" data-category="pastry">Pastry</button>
                    <button class="menu-category-btn" data-category="juices">Juices</button>
                    <button class="menu-category-btn" data-category="maggie">Maggie</button>
                    <button class="menu-category-btn" data-category="fried-rice">Fried Rice</button>
                </div>

                <div class="menu-management-list" id="menuManagementList">
                    <div class="empty-state" id="menuEmptyState">
                        <div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 8h1a4 4 0 010 8h-1"/><path d="M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg></div>
                        <h3 class="empty-title">No menu items yet</h3>
                        <p class="empty-text">Click "Add Item" to create your first menu item</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <button class="app-sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
        <svg viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>

    <div class="modal-overlay" id="menuModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="menuModalTitle">Add New Item</h3>
                <button class="modal-close" id="menuModalClose">&times;</button>
            </div>
            <div class="modal-body">
                <form id="menuForm">
                    <div class="form-group">
                        <label class="form-label">Item Name</label>
                        <input type="text" class="form-input" id="menuItemName" placeholder="e.g. Chicken Biryani" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Description</label>
                        <input type="text" class="form-input" id="menuItemDesc" placeholder="Short description">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Price (₹)</label>
                            <input type="number" class="form-input" id="menuItemPrice" placeholder="145" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Category</label>
                            <select class="form-select" id="menuItemCategory">
                                <option value="biryani">Biryani</option>
                                <option value="pizza">Pizza</option>
                                <option value="burgers">Burgers</option>
                                <option value="drinks">Drinks</option>
                                <option value="snacks">Snacks</option>
                                <option value="desserts">Desserts</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Image (local path)</label>
                        <input type="text" class="form-input" id="menuItemImage" placeholder="assets/images/biryani.jpg">
                    </div>
                    <div class="modal-actions">
                        <button type="button" class="btn btn-secondary" id="menuModalCancel">Cancel</button>
                        <button type="submit" class="btn btn-primary" id="menuModalSave">Add Item</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="js/cursor.js"></script>
    <script src="js/clock.js"></script><script type="module" src="js/app.js"></script>
</body>
</html>

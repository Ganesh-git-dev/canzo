<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Management - Canzo</title>
    <meta name="description" content="Manage canteen orders on Canzo — update statuses, view active orders, and track performance.">
    <meta property="og:title" content="Order Management - Canzo">
    <meta property="og:description" content="Manage canteen orders on Canzo — update statuses, view active orders, and track performance.">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary">
    <link rel="icon" href="https://canzo.in/assets/image/canzo official logo.png" type="image/png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/app.css">
    <link rel="stylesheet" href="css/cursor.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="heavenly-orb heavenly-orb--1"></div>
    <div class="heavenly-orb heavenly-orb--2"></div>
    <div class="heavenly-orb heavenly-orb--3"></div>

    <div class="app-layout">
        <aside class="app-sidebar" id="sidebar">
            <div class="app-sidebar-logo">
                <img src="https://canzo.in/assets/image/canzo official logo.png" alt="Canzo">
            </div>

            <nav class="app-nav">
                <a href="canteen-dashboard.html" class="app-nav-link">
                    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                    Dashboard
                </a>
                <a href="canteen-menu.html" class="app-nav-link">
                    <svg viewBox="0 0 24 24"><path d="M18 8h1a4 4 0 010 8h-1"/><path d="M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>
                    Manage Menu
                </a>
                <a href="canteen-orders.html" class="app-nav-link active">
                    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
                    Orders
                    <span class="app-badge app-badge--pulse">3</span>
                </a>
                <div class="app-nav-divider"></div>
                <a href="canteen-analytics.html" class="app-nav-link">
                    <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
                    Analytics
                </a>
                <a href="canteen-settings.html" class="app-nav-link">
                    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
                    Settings
                </a>
                <div class="app-nav-divider"></div>
                <a href="login.html" class="app-nav-link">
                    <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    Logout
                </a>
            </nav>

            <div class="app-sidebar-footer">
                <div class="app-user-info">
                    <div class="app-user-avatar app-user-avatar--canteen">MC</div>
                    <div class="app-user-details">
                        <div class="app-user-name">Main Canteen</div>
                        <div class="app-user-role">Block A, Ground Floor</div>
                    </div>
                </div>
            </div>
        </aside>

        <main class="app-main">
            <header class="app-header">
                <div class="app-header-left">
                    <div>
                        <h1 class="app-header-title">Order Management</h1>
                        <p class="app-header-subtitle">Manage all incoming and active orders</p>
                    </div>
                </div>
                <div class="app-header-right">
                    <div class="order-filters">
                        <select class="form-select form-select--sm" id="orderStatusFilter">
                            <option value="all">All Status</option>
                            <option value="pending">Pending</option>
                            <option value="accepted">Accepted</option>
                            <option value="preparing">Preparing</option>
                            <option value="ready">Ready</option>
                            <option value="picked">Picked Up</option>
                            <option value="cancelled">Cancelled</option>
                        </select>
                        <select class="form-select form-select--sm" id="orderSlotFilter">
                            <option value="all">All Slots</option>
                            <option value="morning">Morning</option>
                            <option value="lunch">Lunch</option>
                            <option value="evening">Evening</option>
                        </select>
                    </div>
                    <div class="order-search">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                        <input type="text" class="form-input form-input--sm" id="orderSearchInput" placeholder="Search order or name...">
                    </div>
                </div>
            </header>

            <div class="app-content">
                <div class="canteen-orders-tabs" id="canteenOrdersTabs">
                    <button class="canteen-orders-tab active" data-tab="active">Active (0)</button>
                    <button class="canteen-orders-tab" data-tab="completed">Completed (0)</button>
                    <button class="canteen-orders-tab" data-tab="cancelled">Cancelled (0)</button>
                </div>

                <div class="content-card">
                    <div class="content-card-body">
                        <div class="canteen-orders-table" id="canteenOrdersTable">
                            <div class="canteen-orders-table-header">
                                <div class="canteen-orders-table-col">Order</div>
                                <div class="canteen-orders-table-col">Student</div>
                                <div class="canteen-orders-table-col">Items</div>
                                <div class="canteen-orders-table-col">Slot</div>
                                <div class="canteen-orders-table-col">Status</div>
                                <div class="canteen-orders-table-col">Action</div>
                            </div>
                            <div id="canteenOrdersTableBody"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <button class="app-sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
        <svg viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>

    <script src="js/cursor.js"></script>
    <script src="js/clock.js"></script><script type="module" src="js/app.js"></script>
</body>
</html>

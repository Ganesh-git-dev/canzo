    <meta property="og:title" content="Settings - Canzo">
    <meta property="og:description" content="Manage your Canzo student profile and preferences.">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary">
    <link rel="icon" href="https://canzo.in/assets/image/canzo official logo.png" type="image/png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/app.css">
    <link rel="stylesheet" href="css/cursor.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="heavenly-orb heavenly-orb--1"></div>
    <div class="heavenly-orb heavenly-orb--2"></div>
    <div class="heavenly-orb heavenly-orb--3"></div>

    <div class="app-layout">
        <aside class="app-sidebar" id="sidebar">
            <div class="app-sidebar-logo">
                <img src="https://canzo.in/assets/image/canzo official logo.png" alt="Canzo">
            </div>
            <nav class="app-nav">
                <a href="dashboard.html" class="app-nav-link">
                    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                    Dashboard
                </a>
                <a href="canteens.html" class="app-nav-link">
                    <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
                    Canteens
                </a>
                <a href="menu.html" class="app-nav-link">
                    <svg viewBox="0 0 24 24"><path d="M18 8h1a4 4 0 010 8h-1"/><path d="M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>
                    Menu
                </a>
                <a href="cart.html" class="app-nav-link">
                    <svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
                    Cart
                    <span class="app-badge" style="display: none;">0</span>
                </a>
                <div class="app-nav-divider"></div>
                <a href="orders.html" class="app-nav-link">
                    <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                    My Orders
                </a>
                <a href="bills.html" class="app-nav-link">
                    <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
                    Bills
                </a>
                <a href="favorites.html" class="app-nav-link">
                    <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
                    Favorites
                </a>
                <div class="app-nav-divider"></div>
                <a href="student-settings.html" class="app-nav-link active">
                    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
                    Settings
                </a>
                <div class="app-nav-divider"></div>
                <a href="#" id="logoutBtn" class="app-nav-link">
                    <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
                    Logout
                </a>
            </nav>
            <div class="app-sidebar-footer">
                <div class="app-user-info">
                    <div class="app-user-avatar">S</div>
                    <div class="app-user-details">
                        <div class="app-user-name">Student</div>
                        <div class="app-user-role">EASA College</div>
                    </div>
                </div>
            </div>
        </aside>

        <main class="app-main">
            <header class="app-header">
                <div class="app-header-left">
                    <div>
                        <h1 class="app-header-title">Settings</h1>
                        <p class="app-header-subtitle">Manage your profile and preferences</p>
                    </div>
                </div>
            </header>

            <div class="app-content">
                <div class="content-card">
                    <div class="content-card-header">
                        <h3>Profile Settings</h3>
                    </div>
                    <div class="content-card-body">
                        <form id="studentSettingsForm">
                            <div class="form-group">
                                <label class="form-label" for="studentName">Full Name</label>
                                <input type="text" id="studentName" class="form-input" required>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label class="form-label" for="studentDept">Department</label>
                                    <select id="studentDept" class="form-select" required>
                                        <option value="">Choose...</option>
                                        <option value="cse">CSE</option>
                                        <option value="ece">ECE</option>
                                        <option value="eee">EEE</option>
                                        <option value="mech">MECH</option>
                                        <option value="civil">CIVIL</option>
                                        <option value="it">IT</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label class="form-label" for="studentYear">Year</label>
                                    <select id="studentYear" class="form-select" required>
                                        <option value="">Year</option>
                                        <option value="1st Year">1st Year</option>
                                        <option value="2nd Year">2nd Year</option>
                                        <option value="3rd Year">3rd Year</option>
                                        <option value="4th Year">4th Year</option>
                                    </select>
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="form-label" for="studentPhone">Phone Number</label>
                                <input type="tel" id="studentPhone" class="form-input" placeholder="+91 701073672X">
                            </div>
                            <div class="form-group">
                                <label class="form-label" for="studentReg">Register Number</label>
                                <input type="text" id="studentReg" class="form-input" placeholder="E720524AM006" required>
                            </div>
                            <div class="form-actions">
                                <button type="button" class="btn btn-primary btn-large" id="saveStudentSettings">Save Changes</button>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="content-card" style="margin-top: 24px;">
                    <div class="content-card-header">
                        <h3>Preferences</h3>
                    </div>
                    <div class="content-card-body">
                        <div class="form-group">
                            <label class="form-label">Theme</label>
                            <div style="display: flex; gap: 12px; margin-top: 8px;">
                                <button type="button" class="btn btn-secondary" id="themeLightBtn">Light</button>
                                <button type="button" class="btn btn-secondary" id="themeDarkBtn">Dark</button>
                            </div>
                        </div>
                        <div class="form-group" style="margin-top: 16px;">
                            <label class="form-label">Danger Zone</label>
                            <button type="button" class="btn btn-danger" id="clearCartBtn" style="margin-top: 8px;">Clear Cart</button>
                            <button type="button" class="btn btn-danger" id="clearFavoritesBtn" style="margin-top: 8px; margin-left: 8px;">Clear Favorites</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <button class="app-sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
        <svg viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>

    <script src="js/cursor.js"></script>
    <script src="js/clock.js"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>

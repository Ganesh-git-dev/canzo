<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Canzo</title>
    <meta name="description" content="Login to your Canzo account to pre-order meals from your college canteen.">
    <meta property="og:title" content="Login - Canzo">
    <meta property="og:description" content="Login to your Canzo account to pre-order meals from your college canteen.">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary">
    <link rel="icon" href="https://canzo.in/assets/image/canzo official logo.png" type="image/png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/app.css">
    <link rel="stylesheet" href="css/cursor.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Heavenly background orbs -->
    <div class="heavenly-orb heavenly-orb--1"></div>
    <div class="heavenly-orb heavenly-orb--2"></div>
    <div class="heavenly-orb heavenly-orb--3"></div>

    <!-- Login Page -->
    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <img src="https://canzo.in/assets/image/canzo official logo.png" alt="Canzo Logo" class="auth-logo">
                    <h1 class="auth-title">Welcome Back</h1>
                    <p class="auth-subtitle">Sign in to your Canzo account</p>
                </div>

                <form id="loginForm" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label class="form-label" for="email">Email Address</label>
                        <input type="email" id="email" class="form-input" placeholder="e720524am006@ecetonline.com" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="password">Password</label>
                        <input type="password" id="password" class="form-input" placeholder="Enter your password" required>
                    </div>

                    <div class="form-group" style="display: flex; justify-content: space-between; align-items: center;">
                        <div class="form-checkbox">
                            <input type="checkbox" id="remember">
                            <label for="remember">Remember me</label>
                        </div>
                        <a href="#" style="font-size: 14px; color: var(--color-accent); font-weight: 500;">Forgot password?</a>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary btn-large btn-full">Sign In</button>
                    </div>
                </form>

                <div class="form-divider">or continue with</div>

                <button type="button" class="btn-google" id="googleLoginBtn">
                    <svg viewBox="0 0 24 24" width="20" height="20"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                    Sign in with Google
                </button>

                <div class="form-footer">
                    Don't have an account? <a href="register.html">Create one</a>
                </div>

                <div style="margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--color-gray-200); text-align: center;">
                    <p style="font-size: 13px; color: var(--color-text-light); margin: 0;">Canteen Admin?</p>
                    <a href="register.html?role=canteen" style="font-size: 14px; color: var(--color-accent); font-weight: 500;">Register as Canteen Admin</a>
                </div>
            </div>

            <p style="text-align: center; margin-top: 24px; font-size: 14px; color: var(--color-text-light);">
                <a href="index.html" style="color: var(--color-accent); font-weight: 500;">← Back to home</a>
            </p>
        </div>
    </div>

    <script src="js/cursor.js"></script>
    <script src="js/clock.js"></script><script type="module" src="js/app.js"></script>
</body>
</html>
